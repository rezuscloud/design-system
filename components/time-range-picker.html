<!--

-->
<div class="ds-time-range" role="group" aria-label="Time range">
	<button class="ds-time-range-btn" type="button" aria-pressed="false">5m</button>
	<button class="ds-time-range-btn" type="button" aria-pressed="false">15m</button>
	<button class="ds-time-range-btn" type="button" aria-pressed="false">1h</button>

	<button class="ds-time-range-refresh" type="button" aria-label="Refresh now">
		<span aria-hidden="true">↻</span>
		<span class="ds-time-range-refresh-text">10s</span>
	</button>
</div>
