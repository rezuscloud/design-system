<!--
  Status Dot — RezusCloud Design System
  Small colored square indicating resource status.
  Uses semantic colors: positive (green), negative (red), warning (amber), neutral (muted).
-->
<div style="display: flex; gap: 0.75rem; align-items: center;">
	<span class="ds-status-dot ds-status-dot--positive" aria-label="Healthy"></span>
	<span class="ds-status-dot ds-status-dot--warning" aria-label="Degraded"></span>
	<span class="ds-status-dot ds-status-dot--negative" aria-label="Error"></span>
	<span class="ds-status-dot ds-status-dot--neutral" aria-label="Unknown"></span>
</div>

<style>
.ds-status-dot {
	width: 0.5rem;
	height: 0.5rem;
	border-radius: 0;
	flex-shrink: 0;
	display: inline-block;
}
.ds-status-dot--positive {
	background: var(--color-positive);
}
.ds-status-dot--negative {
	background: var(--color-negative);
	animation: ds-status-blink 2s step-end infinite;
}
.ds-status-dot--warning {
	background: var(--color-warning);
}
.ds-status-dot--neutral {
	background: var(--color-rule);
}
.dark .ds-status-dot--positive {
	background: var(--color-positive-next);
}
.dark .ds-status-dot--negative {
	background: var(--color-negative-next);
}
.dark .ds-status-dot--warning {
	background: var(--color-warning-next);
}
.dark .ds-status-dot--neutral {
	background: var(--color-next-light);
}
@keyframes ds-status-blink {
	0%, 70% { opacity: 1; }
	71%, 100% { opacity: 0.3; }
}
@media (prefers-reduced-motion: reduce) {
	.ds-status-dot--negative {
		animation: none;
	}
}
</style>
