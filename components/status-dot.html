<!--
  Status Dot — RezusCloud Design System
  Small colored square indicating resource status.
  Uses semantic colors: positive (green), negative (red), neutral (muted).
-->
<div style="display: flex; gap: 0.75rem; align-items: center;">
	<span class="ds-status-dot ds-status-dot--positive" aria-label="Healthy"></span>
	<span class="ds-status-dot ds-status-dot--negative" aria-label="Error"></span>
	<span class="ds-status-dot ds-status-dot--neutral" aria-label="Unknown"></span>
</div>

<style>
.ds-status-dot {
	width: 0.5rem;
	height: 0.5rem;

}
.ds-status-dot--negative {
