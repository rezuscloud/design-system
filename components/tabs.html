<!--
  Tabs — RezusCloud Design System
  Mac: 1px ink border bottom on active, rule divider
  NeXT: Raised bevel active tab, inset bevel inactive
-->
<div class="ds-tabs" role="tablist" aria-label="Content tabs">
	<button class="ds-tab ds-tab--active" role="tab" aria-selected="true" id="tab-overview" aria-controls="panel-overview">Overview</button>
	<button class="ds-tab" role="tab" aria-selected="false" id="tab-nodes" tabindex="-1">Nodes</button>
	<button class="ds-tab" role="tab" aria-selected="false" id="tab-workloads" tabindex="-1">Workloads</button>
	<button class="ds-tab" role="tab" aria-selected="false" id="tab-networking" tabindex="-1">Networking</button>
	<button class="ds-tab ds-tab--disabled" role="tab" aria-selected="false" id="tab-metrics" disabled>Metrics</button>
</div>

<style>
.ds-tabs {
	display: flex;
	border-bottom: 1px solid var(--color-rule);
}
.dark .ds-tabs {
	border-bottom: 2px solid var(--color-next-bevel-hi);
}
.ds-tab {
	padding: 0.5rem 1rem;
	background: none;
	border: none;
	border-bottom: 2px solid transparent;
	font-family: "Silkscreen", system-ui, sans-serif;
	font-size: 0.75rem;
	font-weight: 700;
	color: var(--color-ink-muted);
	text-transform: uppercase;
	letter-spacing: 0.05em;
	cursor: pointer;
	border-radius: 0;
	transition: color 0.15s, border-color 0.15s;
	margin-bottom: -1px;
}
.ds-tab:hover {
	color: var(--color-ink);
}
.ds-tab--active {
	color: var(--color-ink);
	border-bottom-color: var(--color-ink);
}
.ds-tab--disabled {
	opacity: 0.4;
	cursor: not-allowed;
}
.ds-tab--disabled:hover {
	color: var(--color-ink-muted);
}
.dark .ds-tab {
	color: var(--color-next-subtle);
	margin-bottom: -2px;
}
.dark .ds-tab:hover {
	color: var(--color-next-white);
}
.dark .ds-tab--active {
	color: var(--color-next-teal);
	border-bottom-color: var(--color-next-teal);
}
</style>
