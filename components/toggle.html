<!--
  Toggle — RezusCloud Design System
  NeXTSTEP-style two-position switch.
  Mac: ink track when on, rule track when off. Square thumb.
  NeXT: teal track when on, next-mid track when off. Raised bevel thumb.
-->
<label class="ds-toggle">
	<input type="checkbox" class="ds-toggle-input" checked role="switch" aria-checked="true" />
	<span class="ds-toggle-track">
		<span class="ds-toggle-thumb"></span>
	</span>
	<span class="ds-toggle-label">Dark Mode</span>
</label>

<label class="ds-toggle">
	<input type="checkbox" class="ds-toggle-input" role="switch" aria-checked="false" />
	<span class="ds-toggle-track">
		<span class="ds-toggle-thumb"></span>
	</span>
	<span class="ds-toggle-label">GPU Scheduling</span>
</label>

<style>
.ds-toggle {
	display: inline-flex;
	align-items: center;
	gap: 0.5rem;
	cursor: pointer;
	user-select: none;
}
.ds-toggle-input {
	position: absolute;
	opacity: 0;
	width: 0;
	height: 0;
}
.ds-toggle-track {
	width: 2.5rem;
	height: 1.25rem;
	display: flex;
	align-items: center;
	padding: 0.125rem;
	background: var(--color-rule);
	border: 1px solid var(--color-rule);
	border-radius: 0;
	transition: background 0.15s, border-color 0.15s;
}
.ds-toggle-thumb {
	width: 1rem;
	height: 1rem;
	background: var(--color-paper);
	border: 1px solid var(--color-rule);
	border-radius: 0;
	transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
}
.ds-toggle-input:checked + .ds-toggle-track {
	background: var(--color-ink);
	border-color: var(--color-ink);
}
.ds-toggle-input:checked + .ds-toggle-track .ds-toggle-thumb {
	transform: translateX(1.25rem);
	border-color: var(--color-ink);
}
.ds-toggle-input:focus-visible + .ds-toggle-track {
	outline: 2px solid var(--color-accent-gold);
	outline-offset: 2px;
}
.dark .ds-toggle-track {
	background: var(--color-next-mid);
	border: 2px solid;
	border-color: var(--color-next-bevel-lo) var(--color-next-bevel-hi) var(--color-next-bevel-hi) var(--color-next-bevel-lo);
}
.dark .ds-toggle-thumb {
	width: 0.875rem;
	height: 0.875rem;
	background: var(--color-next-white);
	border: 2px solid;
	border-color: var(--color-next-bevel-hi) var(--color-next-bevel-lo) var(--color-next-bevel-lo) var(--color-next-bevel-hi);
}
.dark .ds-toggle-input:checked + .ds-toggle-track {
	background: var(--color-next-teal);
	border-color: var(--color-next-bevel-lo) var(--color-next-bevel-hi) var(--color-next-bevel-hi) var(--color-next-bevel-lo);
}
.dark .ds-toggle-input:checked + .ds-toggle-track .ds-toggle-thumb {
	transform: translateX(1.25rem);
}
.dark .ds-toggle-input:focus-visible + .ds-toggle-track {
	outline-color: var(--color-next-light);
}
.ds-toggle-label {
	font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
	font-size: 0.875rem;
	color: var(--color-ink);
}
.dark .ds-toggle-label {
	color: var(--color-next-white);
}
@media (prefers-reduced-motion: reduce) {
	.ds-toggle-thumb {
		transition: none;
	}
	.ds-toggle-track {
		transition: none;
	}
}
</style>
