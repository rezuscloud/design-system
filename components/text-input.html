<div class="ds-input-group">

	<span class="ds-input-help" id="ds-input-help">Lowercase, hyphens allowed. 3 to 32 characters.</span>
</div>

<div class="ds-input-group">
	<label class="ds-input-label" for="ds-input-error">API Endpoint</label>
	<input type="text" id="ds-input-error" class="ds-input ds-input--error" value="htp://wrong" aria-describedby="ds-input-error-msg" aria-invalid="true" />
	<span class="ds-input-error" id="ds-input-error-msg" role="alert">Must start with https://</span>
</div>

<div class="ds-input-group">
	<label class="ds-input-label" for="ds-input-disabled">License Key</label>
	<input type="text" id="ds-input-disabled" class="ds-input ds-input--disabled" disabled value="Not required" />
</div>
