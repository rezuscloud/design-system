<!--
  Status Badge — RezusCloud Design System
  Inline text badge for resource phase/stage labels.
  Four variants: positive (active, ready), negative (removing, error), warning (degraded), neutral (forming, pending).
  Mac: surface bg, 1px rule border, semantic text color
  NeXT: next-dark bg, 1px next-mid border, semantic text color
-->
<div style="display: flex; gap: 0.5rem; align-items: center;">
	<span class="ds-status-badge ds-status-badge--positive" role="status" aria-label="Active">Active</span>
	<span class="ds-status-badge ds-status-badge--negative" role="status" aria-label="Removing">Removing</span>
	<span class="ds-status-badge ds-status-badge--warning" role="status" aria-label="Degraded">Degraded</span>
	<span class="ds-status-badge ds-status-badge--neutral" role="status" aria-label="Forming">Forming</span>
</div>

<style>
.ds-status-badge {
	display: inline-block;
	padding: 0.0625rem 0.375rem;
	font-family: "Silkscreen", system-ui, sans-serif;
	font-size: 0.5625rem;
	font-weight: 700;
	text-transform: uppercase;
	letter-spacing: 0.05em;
	line-height: 1.5;
	border: 1px solid var(--color-rule);
	background: var(--color-surface);
}
.dark .ds-status-badge {
	border: 1px solid var(--color-next-mid);
	background: var(--color-next-dark);
}
.ds-status-badge--positive {
	color: var(--color-positive);
	border-color: var(--color-positive);
}
.dark .ds-status-badge--positive {
	color: var(--color-positive-next);
	border-color: var(--color-positive-next);
}
.ds-status-badge--negative {
	color: var(--color-negative);
	border-color: var(--color-negative);
}
.dark .ds-status-badge--negative {
	color: var(--color-negative-next);
	border-color: var(--color-negative-next);
}
.ds-status-badge--warning {
	color: var(--color-warning);
	border-color: var(--color-warning);
}
.dark .ds-status-badge--warning {
	color: var(--color-warning-next);
	border-color: var(--color-warning-next);
}
.ds-status-badge--neutral {
	color: var(--color-ink-muted);
	border-color: var(--color-rule);
}
.dark .ds-status-badge--neutral {
	color: var(--color-next-subtle);
	border-color: var(--color-next-mid);
}
</style>
